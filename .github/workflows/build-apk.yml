name: "Build & Release APK"

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Restore debug keystore
        run: |
          mkdir -p $HOME/.android
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $HOME/.android/debug.keystore
          echo "Keystore ripristinato in $HOME/.android/debug.keystore"

      - name: Verify keystore SHA1
        run: |
          keytool -list -v \
            -keystore $HOME/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            | grep "SHA1"

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_KEYSTORE_PATH:     ${{ github.workspace }}/../../.android/debug.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK with version
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/GestioneSpese-v${{ steps.version.outputs.version }}.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GestioneSpese-v${{ steps.version.outputs.version }}-${{ github.sha }}
          path: app/build/outputs/apk/debug/GestioneSpese-v${{ steps.version.outputs.version }}.apk
          retention-days: 30

      - name: Get short SHA
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        id: slug
        run: echo "sha7=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Get changed files summary
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | head -20 | sed 's/^/- /' || echo "- Prima release")
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ steps.slug.outputs.sha7 }}
          name: "Gestione Spese v${{ steps.version.outputs.version }}"
          body: |
            ## 📱 Gestione Spese v${{ steps.version.outputs.version }}

            ### 📦 Installazione
            1. Scarica `GestioneSpese-v${{ steps.version.outputs.version }}.apk`
            2. Abilita **"Installa da fonti sconosciute"** nelle impostazioni Android
            3. Apri il file e installa

            ### 🔧 Dettagli build
            | | |
            |---|---|
            | **Versione** | v${{ steps.version.outputs.version }} |
            | **Commit** | `${{ steps.slug.outputs.sha7 }}` |
            | **Data** | ${{ github.event.head_commit.timestamp }} |
            | **SHA1 keystore** | `DC:56:2D:23:C6:90:A1:37:D3:7C:23:DE:99:85:AF:32:D0:7E:D0:1B` |

            ### 📝 Commit
            > ${{ github.event.head_commit.message }}

            ### 📂 File modificati
            ${{ steps.changes.outputs.files }}

            ---
            > ⚠️ Build di **debug** — non per distribuzione pubblica.
          files: app/build/outputs/apk/debug/GestioneSpese-v${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest tag
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest — v${{ steps.version.outputs.version }}"
          body: |
            Ultima build stabile — **v${{ steps.version.outputs.version }}**
          files: app/build/outputs/apk/debug/GestioneSpese-v${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
